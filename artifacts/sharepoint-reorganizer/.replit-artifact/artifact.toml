kind = "web"
previewPath = "/"
title = "SharePoint Reorganizer"
version = "1.0.0"
id = "artifacts/sharepoint-reorganizer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21535
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/sharepoint-reorganizer run dev"

[services.env]
PORT = "21535"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/sharepoint-reorganizer", "run", "build"]
publicDir = "artifacts/sharepoint-reorganizer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
